<!DOCTYPE html>
<html>

<head>
    <title>Donation</title>
</head>

<body>
    <div id="address"></div>
    <div id="balance"></div>

    <input type="number" id="amount" step="any" />
    <button id="donate">Donate</button>

    <script src="./ethers-5.7.umd.min.js" type="application/javascript"></script>

    <script type="module">
        const provider = new ethers.providers.JsonRpcProvider(
            "http://localhost:8545"
        );

        const wallet = new ethers.Wallet(
            "0xb5cf8eeb846dd6fc718275edabb84ee15a9ec1b909ab6b93db8776fcd6046c61",
            provider
        );

        async function updateBalance() {
            const balance = await provider.getBalance(wallet.address);
            document.getElementById("balance").textContent =
                ethers.utils.formatEther(balance);
        }

        async function init() {
            document.getElementById("address").textContent = wallet.address;
            await updateBalance();
        }

        async function donate() {
            const amount = document.getElementById("amount").value;

            if (!amount || Number(amount) <= 0) {
                return;
            }

            try {
                const tx = await wallet.sendTransaction({
                    to: "0x837F324FF70AD9AE4B71084c941c23dDF8371d60",
                    value: ethers.utils.parseEther(amount),
                });

                await tx.wait();
                await updateBalance();
            } catch (err) {
                console.error(err);
            }
        }

        document
            .getElementById("donate")
            .addEventListener("click", donate);

        init();
    </script>
</body>

</html>
